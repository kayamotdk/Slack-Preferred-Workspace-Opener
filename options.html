<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Slack Preferred Workspace Opener - Options</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 20px; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
      input { padding: 8px; width: 320px; }
      button { padding: 8px 12px; cursor: pointer; }
      .hint { color: #666; margin-top: 8px; line-height: 1.5; }
      .ok { color: #0a7; margin-top: 10px; }
      .err { color: #c00; margin-top: 10px; }
      code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Slack Preferred Workspace Opener</h1>

    <p>右クリックメニューで開く Slack workspace（サブドメイン）を設定します。</p>

    <div class="row">
      <label for="workspace"><strong>Workspace:</strong></label>
      <input id="workspace" placeholder="例: example-workspace" />
      <button id="save">保存</button>
    </div>

    <div class="hint">
      入力は <code>example-workspace</code> のようにサブドメインだけでOKです。<br />
      （<code>https://</code> や <code>.slack.com</code> を入れても自動で整形します）<br />
      対象リンクは <code>https://*.slack.com/archives/*</code> のみです。
    </div>

    <div id="msg"></div>

    <script src="options.js"></script>
  </body>
</html>
